<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Medify</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #e8e3cc; --text: #2b1200; --muted: #6b5a4a; --border: #c4bfa0; --card: #eae6d4; --input: #eae6d2; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 48px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 40px; height: 40px; background: #f0ede0;
      border-radius: 10px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 800; color: var(--text); }
    .nav { display: flex; align-items: center; gap: 20px; }
    .nav a { text-decoration: none; color: var(--text); font-size: 15px; font-weight: 500; }
    .nav a.btn-header { padding: 9px 22px; border: 1.5px solid var(--text); border-radius: 7px; transition: all 0.2s; }
    .nav a.btn-header:hover { background: var(--text); color: var(--bg); }

    /* PAGE */
    .page { display: flex; align-items: center; justify-content: center; padding: 60px 24px; min-height: calc(100vh - 73px); }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 44px;
      width: 100%; max-width: 480px;
    }
    .card-header { text-align: center; margin-bottom: 32px; }
    .card-header h1 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .card-header p { font-size: 15px; color: var(--muted); }

    /* FORM */
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    input, select {
      width: 100%; padding: 13px 16px;
      background: var(--input); border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; color: var(--text);
      font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s;
      appearance: none; -webkit-appearance: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus, select:focus { border-color: var(--text); }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 14px;
    }
    select { cursor: pointer; }
    select option[value=""] { color: var(--muted); }

    /* BUTTON */
    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--bg); border: 1.5px solid var(--text);
      border-radius: 8px; font-size: 16px; font-weight: 700;
      color: var(--text); cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s; margin-top: 8px;
    }
    .btn-submit:hover { background: var(--text); color: var(--bg); }

    /* ERROR */
    .error-msg { color: #c0392b; font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 18px; }

    /* FOOTER LINK */
    .card-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
    .card-footer a { color: var(--text); font-weight: 600; text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <div class="logo-icon">⚕️</div>
    <span class="logo-text">Medify</span>
  </div>
  <nav class="nav">
    <a href="/login">Login</a>
    <a href="/register" class="btn-header">Get Started</a>
  </nav>
</header>

<!-- LOGIN CARD -->
<div class="page">
  <div class="card">
    <div class="card-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>

    <p class="error-msg" id="error-msg"></p>

    <div class="form-group">
      <label for="role">I am a</label>
      <div class="select-wrap">
        <select id="role">
          <option value="">Select your role</option>
          <option value="doctor">Doctor</option>
          <option value="pharmacist">Pharmacist</option>
          <option value="patient">Patient</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password"/>
    </div>

    <button class="btn-submit" onclick="handleLogin()">Sign In</button>

    <div class="card-footer">
      Don't have an account? <a href="/register">Sign up</a>
    </div>
  </div>
</div>

<script>
  async function handleLogin() {
    const role     = document.getElementById('role').value;
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');

    errorMsg.textContent = '';

    if (!role || !email || !password) {
      errorMsg.textContent = 'Please fill in all fields.';
      return;
    }

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role })
      });

      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.message || 'Login failed.';
        return;
      }

      // Redirect based on role
      if (data.role === 'doctor')      window.location.href = '/doctor/dashboard';
      else if (data.role === 'pharmacist') window.location.href = '/pharmacist/dashboard';
      else                              window.location.href = '/patient/dashboard';

    } catch (err) {
      errorMsg.textContent = 'Server error. Please try again.';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
