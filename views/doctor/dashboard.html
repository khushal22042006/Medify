<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Dashboard - Medify</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #e8e3cc; --text: #2b1200; --muted: #6b5a4a; --border: #c4bfa0; --card: #eae6d4; --input: #eae6d2; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 48px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 40px; height: 40px; background: #f0ede0; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 800; color: var(--text); }
    .nav { display: flex; align-items: center; gap: 20px; }
    .nav a { text-decoration: none; color: var(--text); font-size: 15px; font-weight: 500; }
    .nav a.btn-header { padding: 9px 22px; border: 1.5px solid var(--text); border-radius: 7px; transition: all 0.2s; }
    .nav a.btn-header:hover { background: var(--text); color: var(--bg); }
    .nav button { padding: 9px 22px; border: 1.5px solid var(--text); border-radius: 7px; background: transparent; color: var(--text); font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .nav button:hover { background: var(--text); color: var(--bg); }

    /* MAIN */
    .main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

    /* PAGE TITLE */
    .page-title { margin-bottom: 32px; }
    .page-title h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .page-title p { font-size: 15px; color: var(--muted); }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    @media(max-width:700px){ .stats-grid { grid-template-columns: 1fr; } }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; align-items: center; justify-content: space-between; }
    .stat-card p { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: var(--text); }
    .stat-icon svg { width: 32px; height: 32px; stroke: var(--text); fill: none; stroke-width: 1.8; opacity: 0.6; }

    /* CREATE BTN */
    .create-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; background: var(--card);
      border: 1.5px solid var(--text); border-radius: 8px;
      font-size: 15px; font-weight: 600; color: var(--text);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.2s; margin-bottom: 28px;
    }
    .create-btn:hover { background: var(--text); color: var(--bg); }

    /* FORM CARD */
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; margin-bottom: 32px; display: none; }
    .form-card.visible { display: block; }
    .form-card h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .form-card .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:640px){ .form-grid-2 { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group.full { margin-bottom: 16px; }
    label { font-size: 14px; font-weight: 600; color: var(--text); }
    input, select, textarea {
      padding: 11px 14px; background: var(--input);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; color: var(--text);
      font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s; appearance: none;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, select:focus, textarea:focus { border-color: #8a7a6a; }
    textarea { resize: vertical; }
    .select-wrap { position: relative; }
    .select-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 13px; }
    .form-actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn-primary { padding: 11px 24px; background: var(--text); color: var(--bg); border: 1.5px solid var(--text); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline-sm { padding: 11px 24px; background: transparent; color: var(--text); border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .btn-outline-sm:hover { border-color: var(--text); }

    /* PRESCRIPTIONS */
    .section-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
    .empty-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 64px 24px; text-align: center; }
    .empty-card svg { width: 48px; height: 48px; stroke: var(--muted); fill: none; stroke-width: 1.5; margin: 0 auto 16px; display: block; }
    .empty-card h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-card p { font-size: 14px; color: var(--muted); }

    /* PRESCRIPTION CARDS GRID */
    .rx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media(max-width:900px){ .rx-grid { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:580px){ .rx-grid { grid-template-columns: 1fr; } }
    .rx-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .rx-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .rx-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #d4f0d4; color: #2a6a2a; }
    .rx-card h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .rx-card .rx-med { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
    .rx-detail { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .rx-detail span { color: var(--text); font-weight: 500; }
    .rx-otp { margin-top: 14px; padding: 10px 14px; background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; font-size: 13px; color: var(--muted); }
    .rx-otp strong { color: var(--text); font-size: 15px; letter-spacing: 2px; }

    .error-msg { color: #c0392b; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <div class="logo-icon">⚕️</div>
    <span class="logo-text">Medify</span>
  </div>
  <nav class="nav">
    <span id="doctor-name" style="font-size:14px;color:var(--muted)"></span>
    <button onclick="logout()">Logout</button>
  </nav>
</header>

<div class="main">
  <!-- PAGE TITLE -->
  <div class="page-title">
    <h1>Doctor Dashboard</h1>
    <p>Manage your prescriptions and patients</p>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div>
        <p>Total Prescriptions</p>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
    </div>
    <div class="stat-card">
      <div>
        <p>Active Patients</p>
        <div class="value" id="stat-patients">0</div>
      </div>
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
    </div>
    <div class="stat-card">
      <div>
        <p>Today's Prescriptions</p>
        <div class="value" id="stat-today">0</div>
      </div>
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
    </div>
  </div>

  <!-- CREATE BTN -->
  <button class="create-btn" onclick="toggleForm()">
    <span>+</span> Create New Prescription
  </button>

  <!-- FORM -->
  <div class="form-card" id="create-form">
    <h2>Create New Prescription</h2>
    <p class="subtitle">Fill in the prescription details</p>
    <p class="error-msg" id="form-error"></p>

    <div class="form-grid-2">
      <div class="form-group">
        <label>Patient Name *</label>
        <input type="text" id="patientName" placeholder="Enter patient name"/>
      </div>
      <div class="form-group">
        <label>Patient Email</label>
        <input type="email" id="patientEmail" placeholder="Enter patient email"/>
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label>Medication *</label>
        <input type="text" id="medication" placeholder="Enter medication name"/>
      </div>
      <div class="form-group">
        <label>Dosage *</label>
        <input type="text" id="dosage" placeholder="e.g., 500mg"/>
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label>Frequency</label>
        <div class="select-wrap">
          <select id="frequency">
            <option value="">Select frequency</option>
            <option value="Once daily">Once daily</option>
            <option value="Twice daily">Twice daily</option>
            <option value="Three times daily">Three times daily</option>
            <option value="Four times daily">Four times daily</option>
            <option value="As needed">As needed</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Duration</label>
        <input type="text" id="duration" placeholder="e.g., 7 days"/>
      </div>
    </div>

    <div class="form-group full">
      <label>Special Instructions</label>
      <textarea id="instructions" rows="3" placeholder="Any special instructions for the patient or pharmacist"></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-primary" onclick="createPrescription()">Create Prescription</button>
      <button class="btn-outline-sm" onclick="toggleForm()">Cancel</button>
    </div>
  </div>

  <!-- PRESCRIPTIONS LIST -->
  <h2 class="section-title">Recent Prescriptions</h2>
  <div id="prescriptions-container">
    <div class="empty-card" id="empty-state">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <h3>No prescriptions yet</h3>
      <p>Create your first prescription to get started</p>
    </div>
    <div class="rx-grid" id="rx-grid" style="display:none"></div>
  </div>
</div>

<script>
  let prescriptions = [];

  // Load doctor name from session
  fetch('/api/auth/me').then(r => r.json()).then(data => {
    if (data.name) document.getElementById('doctor-name').textContent = data.name;
  }).catch(() => {});

  function toggleForm() {
    const form = document.getElementById('create-form');
    form.classList.toggle('visible');
    document.getElementById('form-error').textContent = '';
  }

  async function createPrescription() {
    const patientName  = document.getElementById('patientName').value.trim();
    const patientEmail = document.getElementById('patientEmail').value.trim();
    const medication   = document.getElementById('medication').value.trim();
    const dosage       = document.getElementById('dosage').value.trim();
    const frequency    = document.getElementById('frequency').value;
    const duration     = document.getElementById('duration').value.trim();
    const instructions = document.getElementById('instructions').value.trim();
    const errorEl      = document.getElementById('form-error');

    errorEl.textContent = '';

    if (!patientName || !medication || !dosage) {
      errorEl.textContent = 'Please fill in all required fields (Patient Name, Medication, Dosage).';
      return;
    }

    try {
      const res = await fetch('doctor/api/prescriptions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ patientName, patientEmail, medication, dosage, frequency, duration, instructions })
      });

      const data = await res.json();
      if (!res.ok) { errorEl.textContent = data.message || 'Failed to create.'; return; }

      prescriptions.unshift(data.prescription);
      updateStats();
      renderCards();
      resetForm();
      toggleForm();
    } catch(err) {
      errorEl.textContent = 'Server error. Try again.';
    }
  }

  function resetForm() {
    ['patientName','patientEmail','medication','dosage','duration','instructions'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('frequency').value = '';
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = prescriptions.length;
    const uniquePatients = new Set(prescriptions.map(p => p.patientEmail).filter(Boolean)).size;
    document.getElementById('stat-patients').textContent = uniquePatients;
    const today = new Date().toDateString();
    const todayCount = prescriptions.filter(p => new Date(p.createdAt).toDateString() === today).length;
    document.getElementById('stat-today').textContent = todayCount;
  }

  function renderCards() {
    const grid = document.getElementById('rx-grid');
    const empty = document.getElementById('empty-state');

    if (prescriptions.length === 0) {
      empty.style.display = 'block'; grid.style.display = 'none'; return;
    }
    empty.style.display = 'none'; grid.style.display = 'grid';

    grid.innerHTML = prescriptions.map(p => `
      <div class="rx-card">
        <div class="rx-card-top">
          <h3>${p.patientName}</h3>
          <span class="rx-badge">Active</span>
        </div>
        <div class="rx-med">💊 ${p.medication} — ${p.dosage}</div>
        ${p.frequency ? `<div class="rx-detail">Frequency: <span>${p.frequency}</span></div>` : ''}
        ${p.duration  ? `<div class="rx-detail">Duration: <span>${p.duration}</span></div>` : ''}
        ${p.instructions ? `<div class="rx-detail">Notes: <span>${p.instructions}</span></div>` : ''}
        <div class="rx-otp">OTP: <strong>${p.otp}</strong></div>
      </div>
    `).join('');
  }

  // Load existing prescriptions on page load
  async function loadPrescriptions() {
    try {
      const res = await fetch('doctor/api/prescriptions');
      if (res.ok) {
        const data = await res.json();
        prescriptions = data.prescriptions || [];
        updateStats(); renderCards();
      }
    } catch(e) {}
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  loadPrescriptions();
</script>
</body>
</html>
